<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DHANAVRUKSHA CRM - Login</title>
    <link rel="icon" href="./WhatsApp Image 2026-02-25 at 14.27.06.jpeg">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

        .login-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 25%, #334155 50%, #1e293b 75%, #0f172a 100%);
            position: relative;
            overflow: hidden;
        }

        .login-section::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 20% 20%, rgba(212, 175, 55, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(212, 175, 55, 0.1) 0%, transparent 50%);
            animation: quantumFloat 20s ease-in-out infinite;
        }

        @keyframes quantumFloat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .particles {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px; height: 4px;
            background: rgba(212, 175, 55, 0.6);
            border-radius: 50%;
            animation: floatUp 15s infinite linear;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh); opacity: 0; }
        }

        .login-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 3rem;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3), 0 0 120px rgba(212,175,55,0.1);
            border: 2px solid rgba(212, 175, 55, 0.3);
            position: relative;
            z-index: 10;
            transition: all 0.3s ease;
        }

        .login-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 80px rgba(0,0,0,0.4), 0 0 150px rgba(212,175,55,0.2);
        }

        .login-header { text-align: center; margin-bottom: 2.5rem; }

        .login-header .logo {
            width: 80px; height: 80px;
            background: linear-gradient(45deg, #d4af37, #f4e4c1);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.5rem;
            box-shadow: 0 10px 30px rgba(212,175,55,0.3);
            animation: quantumFloat 6s ease-in-out infinite;
        }

        .login-header .logo i { font-size: 2.5rem; color: #0f172a; }

        .login-header h1 {
            font-size: 2rem; font-weight: 800;
            background: linear-gradient(135deg, #d4af37, #f4e4c1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .login-header p { color: #64748b; font-size: 1rem; }

        .form-group { margin-bottom: 1.5rem; }

        .form-group label {
            display: block; margin-bottom: 0.5rem;
            color: #334155; font-weight: 600; font-size: 0.9rem;
        }

        .form-group label i { margin-right: 0.5rem; color: #d4af37; }

        .form-control {
            width: 100%; padding: 1rem 1.25rem;
            border: 2px solid #e2e8f0; border-radius: 12px;
            font-size: 1rem; transition: all 0.3s ease;
            background: rgba(255,255,255,0.8);
        }

        .form-control:focus {
            outline: none; border-color: #d4af37;
            box-shadow: 0 0 0 3px rgba(212,175,55,0.1);
            background: rgba(255,255,255,0.95);
        }

        .checkbox-group {
            display: flex; align-items: center; margin-bottom: 1.5rem;
        }

        .checkbox-group input { width: auto; margin-right: 0.5rem; accent-color: #d4af37; }
        .checkbox-group label { margin: 0; color: #64748b; font-weight: 500; cursor: pointer; }

        .btn-login {
            width: 100%; padding: 1rem 2rem;
            background: linear-gradient(135deg, #d4af37, #f4e4c1);
            color: #0f172a; border: none; border-radius: 12px;
            font-size: 1.1rem; font-weight: 700; cursor: pointer;
            transition: all 0.3s ease;
            display: flex; align-items: center; justify-content: center; gap: 0.75rem;
        }

        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(212,175,55,0.4); }
        .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .error-msg {
            background: #fee2e2; color: #dc2626;
            padding: 0.75rem 1rem; border-radius: 8px;
            margin-bottom: 1rem; font-size: 0.9rem;
            display: none; align-items: center; gap: 0.5rem;
        }
        .error-msg.show { display: flex; }

        @media (max-width: 768px) {
            .login-section { padding: 1rem; }
            .login-container { padding: 2rem; margin: 1rem; }
            .login-header h1 { font-size: 1.75rem; }
        }
    </style>
</head>
<body>
    <section class="login-section">
        <div class="particles" id="particles"></div>
        <div class="login-container">
            <div class="login-header">
                <div class="logo"><i class="fas fa-crown"></i></div>
                <h1>DHANAVRUKSHA CRM</h1>
                <p>Sign in to your account</p>
            </div>

            <div class="error-msg" id="errorMsg">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText"></span>
            </div>

            <div class="form-group">
                <label for="loginEmail"><i class="fas fa-envelope"></i> Email Address</label>
                <input type="email" id="loginEmail" class="form-control" placeholder="Enter your email" autocomplete="email" />
            </div>

            <div class="form-group">
                <label for="loginPassword"><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="loginPassword" class="form-control" placeholder="Enter your password" autocomplete="current-password" />
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="rememberMe">
                <label for="rememberMe">Remember me</label>
            </div>

            <button type="button" class="btn-login" id="loginBtn" onclick="handleLogin()">
                <i class="fas fa-sign-in-alt"></i>
                <span>Login</span>
            </button>
        </div>
    </section>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // ==========================================
        // SUPABASE CONFIG
        // ==========================================
        const SUPABASE_URL = 'https://lyyzmcxotrivtatgwhnh.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_8sK_jCXGT7cVR5qCKnyuSQ_rZPeLYjy';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ==========================================
        // PARTICLES
        // ==========================================
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDelay = Math.random() * 15 + 's';
                p.style.animationDuration = (15 + Math.random() * 10) + 's';
                container.appendChild(p);
            }
        }

        // ==========================================
        // SHOW / HIDE ERROR
        // ==========================================
        function showError(msg) {
            document.getElementById('errorText').textContent = msg;
            document.getElementById('errorMsg').classList.add('show');
        }

        function hideError() {
            document.getElementById('errorMsg').classList.remove('show');
        }

        // ==========================================
        // LOGIN — NO FORM SUBMIT, JUST BUTTON CLICK
        // ==========================================
        async function handleLogin() {
            hideError();

            const email    = document.getElementById('loginEmail').value.trim().toLowerCase();
            const password = document.getElementById('loginPassword').value;
            const remember = document.getElementById('rememberMe').checked;
            const btn      = document.getElementById('loginBtn');

            if (!email || !password) {
                showError('Please enter both email and password.');
                return;
            }

            // Loading state
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';

            try {
                // Step 1: Supabase Auth
                const { data: authData, error: authError } = await supabase.auth.signInWithPassword({ email, password });

                if (authError) throw new Error('Invalid email or password. Please try again.');

                // Step 2: Get role from profiles table
                const { data: profile, error: profileError } = await supabase
                    .from('profiles')
                    .select('*')
                    .eq('id', authData.user.id)
                    .single();

                if (profileError || !profile) throw new Error('Account not set up. Please contact admin.');

                // Step 3: Save session
                const userData = { id: profile.id, email: profile.email, name: profile.full_name, role: profile.role };
                if (remember) {
                    localStorage.setItem('currentUser', JSON.stringify(userData));
                } else {
                    sessionStorage.setItem('currentUser', JSON.stringify(userData));
                }

                // Step 4: Redirect
                btn.innerHTML = '<i class="fas fa-check"></i> Success! Redirecting...';
                setTimeout(() => {
                    window.location.href = profile.role === 'admin' ? 'user-management.html' : 'tasks.html';
                }, 800);

            } catch (error) {
                showError(error.message);
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> <span>Login</span>';
            }
        }

        // Allow pressing Enter to login
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') handleLogin();
        });

        // ==========================================
        // CHECK EXISTING SESSION
        // ==========================================
        async function checkSession() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                const { data: profile } = await supabase
                    .from('profiles').select('role').eq('id', session.user.id).single();
                if (profile) {
                    window.location.href = profile.role === 'admin' ? 'user-management.html' : 'tasks.html';
                }
            }
        }

        // ==========================================
        // INIT
        // ==========================================
        document.addEventListener('DOMContentLoaded', () => {
            createParticles();
            checkSession();
        });
    </script>
</body>
</html>
