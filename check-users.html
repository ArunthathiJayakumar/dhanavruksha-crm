<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Users - Debug</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1000px;
            margin: 20px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .card {
            background: white;
            padding: 25px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #667eea;
        }
        h2 {
            color: #333;
            margin-top: 0;
        }
        pre {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 6px;
            overflow-x: auto;
            border: 1px solid #dee2e6;
        }
        button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin: 5px;
        }
        button:hover {
            background: #5568d3;
        }
        .success {
            background: #d4edda;
            border: 2px solid #28a745;
            color: #155724;
            padding: 15px;
            border-radius: 6px;
        }
        .error {
            background: #f8d7da;
            border: 2px solid #dc3545;
            color: #721c24;
            padding: 15px;
            border-radius: 6px;
        }
        .info {
            background: #d1ecf1;
            border: 2px solid #17a2b8;
            color: #0c5460;
            padding: 15px;
            border-radius: 6px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #dee2e6;
        }
        th {
            background: #667eea;
            color: white;
            font-weight: 600;
        }
        tr:hover {
            background: #f8f9fa;
        }
    </style>
</head>
<body>
    <h1>🔍 User Data Debugger</h1>
    
    <div class="card">
        <h2>Step 1: Check localStorage</h2>
        <button onclick="checkStorage()">Check Users</button>
        <div id="storageResult"></div>
    </div>

    <div class="card">
        <h2>Step 2: Fix Issues</h2>
        <button onclick="fixUsers()" style="background: #28a745;">Fix & Initialize Users</button>
        <button onclick="clearAndFix()" style="background: #dc3545;">Clear All & Rebuild</button>
        <div id="fixResult"></div>
    </div>

    <div class="card">
        <h2>Step 3: View Users in Table</h2>
        <div id="usersTable"></div>
    </div>

    <div class="card">
        <h2>Step 4: Test User Management</h2>
        <button onclick="window.location.href='user-management.html'">Go to User Management</button>
    </div>

    <script>
        function checkStorage() {
            const result = document.getElementById('storageResult');
            const stored = localStorage.getItem('crmUsers');
            
            if (!stored) {
                result.innerHTML = '<div class="error">❌ No users found in localStorage</div>';
                return;
            }
            
            try {
                const users = JSON.parse(stored);
                
                if (!Array.isArray(users)) {
                    result.innerHTML = '<div class="error">❌ Users data is not an array</div>';
                    return;
                }
                
                result.innerHTML = `
                    <div class="success">
                        ✅ Found ${users.length} user(s)<br><br>
                        <strong>Raw Data:</strong>
                        <pre>${stored}</pre>
                        <strong>Parsed:</strong>
                        <pre>${JSON.stringify(users, null, 2)}</pre>
                    </div>
                `;
                
                displayUsersTable(users);
                
            } catch (error) {
                result.innerHTML = `<div class="error">❌ Error parsing: ${error.message}</div>`;
            }
        }

        function fixUsers() {
            const result = document.getElementById('fixResult');
            
            try {
                const stored = localStorage.getItem('crmUsers');
                let users = stored ? JSON.parse(stored) : [];
                
                if (!Array.isArray(users)) {
                    users = [];
                }
                
                // Check if admin exists
                const adminExists = users.find(u => u.email === 'admin@dhanavruksha.com');
                
                if (!adminExists) {
                    users.push({
                        id: 'USR-001',
                        name: 'Admin User',
                        email: 'admin@dhanavruksha.com',
                        password: 'admin123',
                        role: 'admin',
                        status: 'active',
                        createdDate: new Date().toISOString(),
                        lastLogin: new Date().toISOString()
                    });
                }
                
                localStorage.setItem('crmUsers', JSON.stringify(users));
                
                result.innerHTML = `<div class="success">✅ Fixed! Now you have ${users.length} user(s)</div>`;
                
                displayUsersTable(users);
                
            } catch (error) {
                result.innerHTML = `<div class="error">❌ Error: ${error.message}</div>`;
            }
        }

        function clearAndFix() {
            if (!confirm('This will delete all users and create fresh admin. Continue?')) {
                return;
            }
            
            const result = document.getElementById('fixResult');
            
            localStorage.removeItem('crmUsers');
            
            const adminUser = {
                id: 'USR-001',
                name: 'Admin User',
                email: 'admin@dhanavruksha.com',
                password: 'admin123',
                role: 'admin',
                status: 'active',
                createdDate: new Date().toISOString(),
                lastLogin: new Date().toISOString()
            };
            
            localStorage.setItem('crmUsers', JSON.stringify([adminUser]));
            
            result.innerHTML = '<div class="success">✅ Cleared and rebuilt! Admin user created.</div>';
            
            displayUsersTable([adminUser]);
        }

        function displayUsersTable(users) {
            const tableDiv = document.getElementById('usersTable');
            
            if (!users || users.length === 0) {
                tableDiv.innerHTML = '<div class="info">No users to display</div>';
                return;
            }
            
            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Status</th>
                            <th>Created</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            users.forEach(user => {
                html += `
                    <tr>
                        <td>${user.id}</td>
                        <td>${user.name}</td>
                        <td>${user.email}</td>
                        <td><strong>${user.role}</strong></td>
                        <td>${user.status}</td>
                        <td>${new Date(user.createdDate).toLocaleDateString()}</td>
                    </tr>
                `;
            });
            
            html += `
                    </tbody>
                </table>
            `;
            
            tableDiv.innerHTML = html;
        }

        // Auto-check on load
        window.addEventListener('DOMContentLoaded', checkStorage);
    </script>
</body>
</html>
